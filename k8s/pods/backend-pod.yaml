apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      role: backend
  template:
    metadata:
      labels:
        role: backend
    spec:
      serviceAccountName: backend-sa
      containers:
      - name: backend
        image: kimsewon/sandbox-backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        env:
        - name: APP_ENABLE_MOCK_SANDBOX
          value: "false"
        - name: APP_USE_IN_CLUSTER_CONFIG
          value: "true"
        - name: APP_K8S_NAMESPACE
          value: "default"
        - name: APP_SANDBOX_IMAGE
          value: "kimsewon/sandbox-runner:latest"
        - name: APP_BACKEND_BASE_URL
          value: "http://backend-service.default.svc.cluster.local:8000"
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  selector:
    role: backend
  ports:
  - port: 8000
    targetPort: 8000
    nodePort: 30081
  type: NodePort
